# Render.com blueprint — deploys the API + UI as a Docker service.
# Deploy: push this repo to GitHub -> render.com -> New -> Blueprint -> select the repo.
services:
  - type: web
    name: pneumonia-xray-classifier
    runtime: docker
    plan: free             # 512 MB RAM. Enough to serve predictions on tensorflow-cpu;
                           # retraining (loads the full training set) may exceed 512 MB.
                           # Bump to 'starter'/'standard' if you need retrain in the cloud.
    dockerfilePath: ./Dockerfile
    healthCheckPath: /status
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      # keep each container single-threaded so replicas scale cleanly (see results/)
      - key: OMP_NUM_THREADS
        value: "1"
