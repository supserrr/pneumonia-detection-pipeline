events {}
http {
    # Docker's embedded DNS (127.0.0.11) returns one A record per running `api`
    # replica and rotates their order on each query. A static
    # `upstream { server api:8000; }` resolves that name only ONCE at nginx
    # startup and then pins a single replica for the whole process lifetime, so
    # `docker compose up --scale api=N` would send every request to the same
    # container. Putting the name in a variable forces nginx to re-resolve it
    # per request (honouring the resolver + TTL below) — that is what actually
    # round-robins across all replicas.
    resolver 127.0.0.11 valid=5s ipv6=off;
    server {
        listen 80;
        client_max_body_size 100m;
        location / {
            set $backend "api:8000";
            proxy_pass http://$backend$request_uri;
            proxy_set_header Host $host;
            proxy_read_timeout 120s;
        }
    }
}
