# Scale API containers with:  docker compose up --build --scale api=3
# nginx load-balances across all api replicas on http://localhost:8080
services:
  api:
    build: .
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 1g

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api
